<h1>Chicken Recipe</h1>

<img src="https://assets.epicurious.com/photos/62f16ed5fe4be95d5a460eed/1:1/w_1920,c_limit/RoastChicken_RECIPE_080420_37993.jpg" alt="Chicken" width="300">

<h2>Ingredients</h2>
<ul>
  <li>Chicken pieces</li>
  <li>Salt</li>
  <li>Black pepper</li>
  <li>Garlic</li>
  <li>Olive oil</li>
</ul>

<h2>Steps</h2>
<ol>
  <li>Wash the chicken well.</li>
  <li>Add salt, pepper, and garlic.</li>
  <li>Heat oil in a pan.</li>
  <li>Cook chicken until golden.</li>
  <li>Serve hot.</li>
</ol>
