<h1>Pasta Recipe</h1>
<img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/CSIRO_ScienceImage_11385_Pasta_made_from_durum_wheat.jpg" alt="Pasta" width="300">
<h2>Ingredients</h2>
<ul>
  <li>Pasta</li>
  <li>Salt</li>
  <li>Tomato sauce</li>
  <li>Garlic</li>
  <li>Olive oil</li>
</ul>

<h2>Steps</h2>
<ol>
  <li>Boil water in a pot.</li>
  <li>Add salt and pasta.</li>
  <li>Cook pasta for 10 minutes.</li>
  <li>Heat sauce in another pan.</li>
  <li>Mix pasta with sauce.</li>
  <li>Serve hot.</li>
</ol>
